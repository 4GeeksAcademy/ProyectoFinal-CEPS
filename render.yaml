services:
  - type: web
    name: gym-planner-app
    env: python
    region: ohio
    plan: free
    buildCommand: "npm install && npm run build && pipenv install"
    startCommand: "pipenv run gunicorn -b 0.0.0.0:$PORT src.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: gym-planner-db
          property: connectionString
      - key: FLASK_APP_KEY
        generateValue: true
      - key: FLASK_APP
        value: src/app.py
      - key: FLASK_DEBUG
        value: "0"

databases:
  - name: gym-planner-db
    region: ohio
    plan: free
    databaseName: gym_planner
    user: gym_user
